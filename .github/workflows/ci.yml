name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_FUND: "false"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.x", "22.x"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import knowledge base
        run: npm run import:bottobot

      - name: Verify knowledge base is committed
        run: git diff --exit-code -- src/knowledge/data

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Lint Python bridge
        run: npm run lint:py

      - name: Validate recipes
        run: npm run validate:recipes

      - name: Lint recipes
        run: npm run lint:recipes

      - name: Check dependency boundaries
        run: npm run deps:check

      - name: Check complexity gates
        run: make complexity

      - name: Generate agent command catalog
        run: npm run agent:catalog:gen

      - name: Verify generated command catalog is committed
        run: git diff --exit-code -- src/agentCommandCatalog.ts

      - name: Build docs
        run: npm run docs:build

      - name: Verify generated docs are committed
        run: git diff --exit-code -- docs/reference/tools.md

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Test + coverage gate (no-regression floor)
        run: npm run test:coverage

      - name: Smoke — Layer-1/2 register with raw exec OFF (G4)
        env:
          TDMCP_RAW_PYTHON: "off"
        run: npx vitest run tests/smoke/execOff.test.ts

      - name: Build .mcpb bundle
        run: npm run build:mcpb

      - name: Test bridge (Python)
        run: npm run test:bridge

  creative-rag-multilingual-smoke:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Use Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import knowledge base
        run: npm run import:bottobot

      - name: Smoke index with swapped embedding model
        env:
          TDMCP_RAG_EMBED_MODEL: bge-m3
        run: npx vitest run tests/unit/creativeRag/ -t "embedding model"
