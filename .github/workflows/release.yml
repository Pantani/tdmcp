name: Release

# Cut a release by pushing a version tag:
#
#   npm version patch          # or minor / major — bumps package.json + manifest, commits, tags
#   git push --follow-tags     # pushes the commit AND the v* tag
#
# The tag push triggers this workflow, which re-runs the full check suite, builds
# the Claude Desktop `.mcpb` bundle, and publishes a GitHub Release with the
# bundle attached + auto-generated notes. npm publishing stays manual by default;
# set repository variable TDMCP_AUTO_NPM_PUBLISH=true and NPM_TOKEN to opt in.

on:
  push:
    tags:
      - "v*"

# Least privilege by default; the job below elevates only what it needs.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Use Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json and manifest versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          MANIFEST="$(node -p "require('./mcpb/manifest.json').version")"
          SERVER="$(node -p "require('./server.json').version")"
          SERVER_PKG="$(node -p "require('./server.json').packages[0].version")"
          SAFESKILL="$(node -p "require('./safeskill.manifest.json').version")"
          echo "tag=$TAG  package.json=$PKG  manifest=$MANIFEST  server.json=$SERVER  server package=$SERVER_PKG  safeskill=$SAFESKILL"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG. Bump with 'npm version' before tagging."
            exit 1
          fi
          if [ "$MANIFEST" != "$PKG" ]; then
            echo "::error::mcpb/manifest.json version $MANIFEST does not match package.json $PKG (the 'version' npm script keeps them in sync)."
            exit 1
          fi
          if [ "$SERVER" != "$PKG" ]; then
            echo "::error::server.json version $SERVER does not match package.json $PKG."
            exit 1
          fi
          if [ "$SERVER_PKG" != "$PKG" ]; then
            echo "::error::server.json package version $SERVER_PKG does not match package.json $PKG."
            exit 1
          fi
          if [ "$SAFESKILL" != "$PKG" ]; then
            echo "::error::safeskill.manifest.json version $SAFESKILL does not match package.json $PKG."
            exit 1
          fi
          # Bootstrap/self-install pins are intentionally held on the last
          # published tag during release-prep PRs (they point at raw/vX.Y.Z URLs
          # that only resolve once the tag exists). At tag time they MUST match
          # the tag, or the one-click install would download an older bridge and
          # miss this release's bridge routes. sync-manifest-version.mjs advances
          # them; this guard makes that non-optional.
          PIN="$(grep -oE "raw/v[0-9]+\.[0-9]+\.[0-9]+/td/bootstrap\.py" README.md | head -1 | grep -oE "[0-9]+\.[0-9]+\.[0-9]+")"
          echo "bootstrap install pin=v$PIN"
          if [ "$PIN" != "$TAG" ]; then
            echo "::error::Bootstrap install pins are at v$PIN but the tag is v$TAG. Run 'node scripts/sync-manifest-version.mjs' to advance the install pins to the release tag before tagging."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Import knowledge base
        run: npm run import:bottobot

      - name: Run non-publishing release checks
        run: npm run release:check

      - name: Pack the validated npm artifact
        run: |
          PACKAGE_TARBALL="$(npm pack --silent)"
          mv "$PACKAGE_TARBALL" tdmcp-package.tgz

      - name: Upload validated release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: validated-release-artifacts
          path: |
            tdmcp.mcpb
            tdmcp-package.tgz
          if-no-files-found: error

  github-release:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download validated release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: validated-release-artifacts

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # A release may already exist if it was published from the GitHub UI
          # (publishing there creates the tag, which triggers this workflow). In
          # that case just (re)attach the bundle; otherwise create the release.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" tdmcp.mcpb --clobber
          else
            gh release create "$GITHUB_REF_NAME" tdmcp.mcpb \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --verify-tag
          fi

  npm-publish:
    needs: validate
    if: vars.TDMCP_AUTO_NPM_PUBLISH == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download validated npm artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: validated-release-artifacts

      - name: Use Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::TDMCP_AUTO_NPM_PUBLISH is enabled but NPM_TOKEN is not configured."
            exit 1
          fi
          npm publish tdmcp-package.tgz --access public --provenance
          {
            echo "### ✅ Published to npm"
            echo ""
            echo "\`@dpantani/tdmcp@${GITHUB_REF_NAME#v}\` is live on npm."
          } >> "$GITHUB_STEP_SUMMARY"
